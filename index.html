<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Hat-ty | Conclusion Enablement</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    /* ===== Chat ===== */
    .chat {
      max-width: 720px;
      margin: 40px auto 20px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .msg { margin: 10px 0; }
    .bot { color: #003366; white-space: pre-line; }
    .user { text-align: right; }

    /* ===== Input ===== */
    .input-area {
      max-width: 720px;
      margin: auto;
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px 18px;
      background: #003366;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }

    button:hover {
      background: #00539b;
    }

    /* ===== Ticket sidebar ===== */
    .tickets {
      position: fixed;
      top: 40px;
      right: 16px;
      width: 260px;
      background: white;
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      font-size: 13px;
    }

    .tickets h3 {
      margin-top: 0;
      font-size: 15px;
      color: #003366;
    }

    .ticket {
      border-top: 1px solid #eee;
      padding-top: 8px;
      margin-top: 8px;
    }

    .ticket strong {
      display: block;
      color: #003366;
    }
  </style>
</head>
<body>

<!-- ===== Ticket sidebar ===== -->
<div class="tickets">
  <h3>📋 Mijn tickets</h3>
  <div id="ticketsContent">Nog geen tickets</div>
</div>

<!-- ===== Chat ===== -->
<div class="chat" id="chat">
  <div class="msg bot">
    👋 Hallo, ik ben <strong>Hat-ty</strong>.<br>
    Beschrijf kort wat je wilt, wat er niet werkt of welke vraag je hebt.
  </div>
</div>

<div class="input-area">
  <input id="input" placeholder="Typ hier je bericht..." />
  <button onclick="send()">Verstuur</button>
</div>

<script>
/* ================= CONFIG ================= */
const API_BASE = "https://aipc-intake-bot.vercel.app";
const maxQuestions = 5;

/* ================= STATE ================= */
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const ticketsContent = document.getElementById("ticketsContent");

let messages = [];
let tickets = [];
let busy = false;

/* ================= HELPERS ================= */
function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function renderTickets() {
  if (tickets.length === 0) {
    ticketsContent.innerText = "Nog geen tickets";
    return;
  }

  ticketsContent.innerHTML = "";
  tickets.forEach(t => {
    const div = document.createElement("div");
    div.className = "ticket";
    div.innerHTML =
      "<strong>" + t.number + " (" + t.type + ")</strong>" +
      t.summary;
    ticketsContent.appendChild(div);
  });
}

/* ================= INPUT ================= */
function send() {
  const text = input.value.trim();
  if (!text || busy) return;

  addMessage(text, "user");
  input.value = "";
  messages.push({ role: "user", content: text });
  callAI();
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

/* ================= AI CALL ================= */
async function callAI() {
  if (busy) return;
  busy = true;

  try {
    const resp = await fetch(`${API_BASE}/api/next`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages, maxQuestions })
    });

    if (!resp.ok) {
      const err = await resp.text();
      addMessage("❌ AI-backend fout (" + resp.status + ")\n\n" + err, "bot");
      return;
    }

    const data = await resp.json();

    if (data.stage === "question") {
      messages.push({ role: "assistant", content: data.nextQuestion });
      addMessage(data.nextQuestion, "bot");
      return;
    }

    if (data.stage === "confirm") {
      messages.push({ role: "assistant", content: data.summary });
      addMessage(data.summary + "\n\nKlopt dit? (ja/nee)", "bot");
      return;
    }

    if (data.stage === "final") {
      const output =
        "✅ Type: " + data.classification + "\n\n" +
        data.shortDescription;

      addMessage(output, "bot");

      const ticketNr =
        data.classification + Math.floor(100000 + Math.random() * 900000);

      tickets.push({
        number: ticketNr,
        type: data.classification,
        summary: data.shortDescription
      });
      renderTickets();

      addMessage(
        "📨 ServiceNow – Conclusion Enablement\n\n" +
        "Ticketnummer: " + ticketNr + "\n\n" +
        "Eén van de medewerkers zal dit ticket in behandeling nemen.",
        "bot"
      );
    }

  } catch (e) {
    addMessage("❌ Fout bij benaderen AI-backend:\n" + String(e), "bot");
  } finally {
    busy = false;
  }
}
</script>

</body>
</html>
