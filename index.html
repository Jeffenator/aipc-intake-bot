<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>AI Intake Bot</title>
  <style>
    body { font-family: Arial; background: #f4f4f4; padding: 20px; }
    .chat { max-width: 700px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
    .msg { margin: 10px 0; }
    .bot { color: #003366; white-space: pre-line; }
    .user { text-align: right; }
    input { width: 100%; padding: 10px; margin-top: 10px; }
    button { padding: 10px 20px; margin-top: 10px; }
  </style>
</head>
<body>

<div class="chat" id="chat">
  <div class="msg bot">
    Hallo! Beschrijf kort wat je wilt, wat er niet werkt of welke vraag je hebt.
  </div>
</div>

<input id="input" placeholder="Typ hier je bericht..." />
<button onclick="send()">Verstuur</button>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

let step = 0;
let intakeType = "";
let context = {
  problem: "",
  impact: "",
  scope: "",
  since: ""
};

/* ========= HERKENNING INC / RFI / CHG ========= */

const INCIDENT_KEYWORDS = [
  "werkt niet", "stuk", "foutmelding", "crash", "kan niet inloggen",
  "uitval", "probleem", "storing"
];

const RFI_KEYWORDS = [
  "hoe", "wat is", "kan ik", "informatie", "uitleg",
  "handleiding", "vraag"
];

const CHANGE_KEYWORDS = [
  "aanvragen", "toevoegen", "wijzigen", "nieuwe", "bestellen",
  "laptop", "account", "toegang"
];

function detectType(text) {
  const score = { INC: 0, RFI: 0, CHG: 0 };

  INCIDENT_KEYWORDS.forEach(k => { if (text.includes(k)) score.INC++; });
  RFI_KEYWORDS.forEach(k => { if (text.includes(k)) score.RFI++; });
  CHANGE_KEYWORDS.forEach(k => { if (text.includes(k)) score.CHG++; });

  return Object.keys(score).reduce((a, b) => score[a] >= score[b] ? a : b);
}

/* ========= CHAT FUNCTIES ========= */

function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function send() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";
  handleConversation(text.toLowerCase());
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

/* ========= CONVERSATIE ========= */

function handleConversation(text) {

  if (step === 0) {
    context.problem = text;
    intakeType = detectType(text);

    if (intakeType === "INC") {
      addMessage("Dit lijkt op een probleem waarbij iets niet werkt. Ik stel een paar vragen om dit goed te begrijpen.", "bot");
      addMessage("Wat merk je precies van het probleem?", "bot");
    }

    if (intakeType === "RFI") {
      addMessage("Dit lijkt een vraag om informatie. Waarvoor heb je deze informatie nodig?", "bot");
    }

    if (intakeType === "CHG") {
      addMessage("Dit lijkt een wijziging of aanvraag. Wat wil je precies laten aanpassen of aanvragen?", "bot");
    }

    step++;
    return;
  }

  if (step === 1) {
    context.impact = text;

    if (intakeType === "INC") {
      addMessage("Wat is de impact op je werk? Kun je nog doorwerken of ligt je werk stil?", "bot");
    }
    if (intakeType === "RFI") {
      addMessage("Is dit ter informatie of om een actie te kunnen uitvoeren?", "bot");
    }
    if (intakeType === "CHG") {
      addMessage("Is dit een eenmalige aanvraag of een structurele wijziging?", "bot");
    }

    step++;
    return;
  }

  if (step === 2) {
    context.scope = text;

    if (intakeType === "INC") {
      addMessage("Hebben alleen jij, of ook collega’s hier last van?", "bot");
    }
    if (intakeType === "RFI") {
      addMessage("Heb je deze informatie op korte termijn nodig?", "bot");
    }
    if (intakeType === "CHG") {
      addMessage("Wie gaan hier gebruik van maken?", "bot");
    }

    step++;
    return;
  }

  if (step === 3) {
    context.since = text;
    showSummary();
    step++;
    return;
  }

  if (step === 4) {
    if (text.includes("ja")) {
      classify();
    } else {
      addMessage("Oké, kun je aangeven wat er niet klopt?", "bot");
      step++;
    }
    return;
  }

  if (step === 5) {
    context.problem += " (aangepast: " + text + ")";
    showSummary();
    step = 4;
  }
}

/* ========= SAMENVATTING & OUTPUT ========= */

function showSummary() {
  addMessage(
    "Samenvatting:\n\n" +
    "Type: " + intakeType + "\n" +
    "Probleem/verzoek: " + context.problem + "\n" +
    "Impact/doel: " + context.impact + "\n" +
    "Scope: " + context.scope + "\n" +
    "Tijd/context: " + context.since + "\n\n" +
    "Klopt dit? (ja/nee)",
    "bot"
  );
}

function classify() {
  addMessage(
    "✅ Type: " + intakeType + "\n\n" +
    "Short description:\n" + context.problem + "\n\n" +
    "Description:\n" +
    "Context: " + context.impact + ". Scope: " + context.scope +
    ". Tijd: " + context.since + ".\n\n" +
    "Gewenst eindresultaat:\n" +
    "Het verzoek is correct afgehandeld.\n\n" +
    "Redenering:\n" +
    explanation(),
    "bot"
  );
}

function explanation() {
  if (intakeType === "INC")
    return "Dit is een incident omdat iets niet werkt, er sprake is van verstoring en dit directe impact heeft op het werk.";
  if (intakeType === "RFI")
    return "Dit is een RFI omdat er gevraagd wordt om informatie of uitleg zonder dat er iets stuk is.";
  return "Dit is een change omdat er een wijziging of aanvraag wordt gedaan die iets structureel toevoegt of aanpast.";
}
</script>

</body>
</html>
