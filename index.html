<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>AI Intake Bot</title>
  <style>
    body { font-family: Arial; background: #f4f4f4; padding: 20px; }
    .chat { max-width: 700px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
    .msg { margin: 10px 0; }
    .bot { color: #003366; white-space: pre-line; }
    .user { text-align: right; }
    input { width: 100%; padding: 10px; margin-top: 10px; }
    button { padding: 10px 20px; margin-top: 10px; }
  </style>
</head>
<body>

<div class="chat" id="chat">
  <div class="msg bot">
    Hallo! Beschrijf kort wat je wilt, wat er niet werkt of welke vraag je hebt.
  </div>
</div>

<input id="input" placeholder="Typ hier je bericht..." />
<button onclick="send()">Verstuur</button>

<script>
/* =========================================================
   CONFIG
   ========================================================= */

// ✅ Jouw Vercel backend
const API_BASE = "https://aipc-intake-bot.vercel.app";

// ✅ Max aantal AI-vragen
const maxQuestions = 5;

/* =========================================================
   STATE
   ========================================================= */

const chat = document.getElementById("chat");
const input = document.getElementById("input");

// Conversatiegeschiedenis (ChatGPT-achtig)
let messages = [];

// Voorkomt dubbele / oneindige calls
let busy = false;

/* =========================================================
   UI HELPERS
   ========================================================= */

function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* =========================================================
   INPUT HANDLING
   ========================================================= */

function send() {
  const text = input.value.trim();
  if (!text || busy) return;

  addMessage(text, "user");
  input.value = "";

  // Voeg user-input toe aan context
  messages.push({ role: "user", content: text });

  callAI();
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

/* =========================================================
   AI CALL (DE BELANGRIJKSTE FUNCTIE)
   ========================================================= */

async function callAI() {
  if (busy) return;
  busy = true;

  try {
    const resp = await fetch(`${API_BASE}/api/next`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages,
        maxQuestions
      })
    });

    /* -------------------------------
       BACKEND ERROR → DIRECT TONEN
       ------------------------------- */
    if (!resp.ok) {
      const errorText = await resp.text();
      addMessage(
        "❌ AI-backend fout (" + resp.status + ")\n\n" +
        "Details:\n" + errorText + "\n\n" +
        "👉 Check Vercel → Deployments → Functions → api/next → Logs",
        "bot"
      );
      return;
    }

    /* -------------------------------
       JSON VERWERKEN
       ------------------------------- */
    const data = await resp.json();

    // 1️⃣ AI wil een vervolgvraag stellen
    if (data.stage === "question" && data.nextQuestion) {
      messages.push({ role: "assistant", content: data.nextQuestion });
      addMessage(data.nextQuestion, "bot");
      return;
    }

    // 2️⃣ AI geeft samenvatting + bevestiging
    if (data.stage === "confirm" && data.summary) {
      messages.push({ role: "assistant", content: data.summary });
      addMessage(data.summary + "\n\nKlopt dit? (ja/nee)", "bot");
      return;
    }

    // 3️⃣ AI is klaar → ticket output
    if (data.stage === "final") {
      const output =
        "✅ Type: " + (data.classification || "-") + "\n\n" +
        "Short description:\n" + (data.shortDescription || "-") + "\n\n" +
        "Description:\n" + (data.description || "-") + "\n\n" +
        "Gewenst eindresultaat:\n" + (data.desiredOutcome || "-") + "\n\n" +
        "Redenering:\n" + (data.reasoning || "-");

      messages.push({ role: "assistant", content: output });
      addMessage(output, "bot");
      return;
    }

    // Onverwachte maar geldige response
    addMessage(
      "⚠️ Onverwachte AI-response.\nCheck Vercel logs voor details.",
      "bot"
    );

  } catch (err) {
    addMessage(
      "❌ Kon AI-backend niet bereiken.\n\n" +
      "Fout:\n" + String(err),
      "bot"
    );
  } finally {
    busy = false;
  }
}
</script>

</body>
</html>
