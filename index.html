<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>AI Intake Bot</title>
  <style>
    body { font-family: Arial; background: #f4f4f4; padding: 20px; }
    .chat { max-width: 700px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
    .msg { margin: 10px 0; }
    .bot { color: #003366; white-space: pre-line; }
    .user { text-align: right; }
    input { width: 100%; padding: 10px; margin-top: 10px; }
    button { padding: 10px 20px; margin-top: 10px; }
  </style>
</head>
<body>

<div class="chat" id="chat">
  <div class="msg bot">
    Hallo! Beschrijf kort wat je wilt, wat er niet werkt of welke vraag je hebt.
  </div>
</div>

<input id="input" placeholder="Typ hier je bericht..." />
<button onclick="send()">Verstuur</button>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

// 1) Koppel je frontend aan je Vercel backend (zonder slash op het eind)
const API_BASE = "https://aipc-intake-bot.vercel.app";

// 2) We bewaren de conversatie als "messages" (zoals ChatGPT werkt)
let messages = [];
const maxQuestions = 5; // pas aan als je wil

function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function send() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  // 3) Voeg user-bericht toe aan context
  messages.push({ role: "user", content: text });

  // 4) Vraag de AI (via je Vercel endpoint) om volgende stap
  callAI();
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

async function callAI() {
  try {
    const resp = await fetch(`${API_BASE}/api/next`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages,
        maxQuestions
      })
    });

    const data = await resp.json();

    // 5) Drie mogelijke AI-stadia: question, confirm, final
    if (data.stage === "question" && data.nextQuestion) {
      messages.push({ role: "assistant", content: data.nextQuestion });
      addMessage(data.nextQuestion, "bot");
      return;
    }

    if (data.stage === "confirm" && data.summary) {
      messages.push({ role: "assistant", content: data.summary });
      addMessage(data.summary + "\n\nKlopt dit? (ja/nee)", "bot");
      return;
    }

    if (data.stage === "final") {
      const out =
        "✅ Type: " + (data.classification || "-") + "\n\n" +
        "Short description:\n" + (data.shortDescription || "-") + "\n\n" +
        "Description:\n" + (data.description || "-") + "\n\n" +
        "Gewenst eindresultaat:\n" + (data.desiredOutcome || "-") + "\n\n" +
        "Redenering:\n" + (data.reasoning || "-");

      messages.push({ role: "assistant", content: out });
      addMessage(out, "bot");
      return;
    }

    // 6) Fallback als AI iets onverwachts teruggeeft
    addMessage("Ik heb nog iets meer context nodig. Kun je dit verder toelichten?", "bot");
  } catch (e) {
    addMessage("Er ging iets mis bij het benaderen van de AI-backend. Check of Vercel online is en of je endpoint werkt.", "bot");
  }
}
</script>

</body>
</html>
