
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>AI Intake Bot</title>
  <style>
    body { font-family: Arial; background: #f4f4f4; padding: 20px; }
    .chat { max-width: 700px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
    .msg { margin: 10px 0; }
    .bot { color: #003366; white-space: pre-line; }
    .user { text-align: right; }
    input { width: 100%; padding: 10px; margin-top: 10px; }
    button { padding: 10px 20px; margin-top: 10px; }
  </style>
</head>
<body>

<div class="chat" id="chat">
  <div class="msg bot">
    Hallo! Beschrijf kort wat je wilt, wat er niet werkt of welke vraag je hebt.
  </div>
</div>

<input id="input" placeholder="Typ hier je bericht..." />
<button onclick="send()">Verstuur</button>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

let step = 0;
let context = {
  problem: "",
  impact: "",
  scope: "",
  since: ""
};

function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function send() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";
  handleConversation(text.toLowerCase());
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

function handleConversation(text) {

  // Stap 0 – probleem herkennen
  if (step === 0) {
    context.problem = text;

    if (text.includes("outlook")) {
      addMessage("Gaat het om inloggen, mail verzenden/ontvangen of werkt Outlook helemaal niet?", "bot");
    } else if (text.includes("vpn")) {
      addMessage("Kun je aangeven welke foutmelding je krijgt bij het verbinden met VPN?", "bot");
    } else if (text.includes("wifi") || text.includes("internet")) {
      addMessage("Is de verbinding overal weg of alleen op één locatie?", "bot");
    } else {
      addMessage("Kun je beschrijven wat er precies niet meer werkt?", "bot");
    }

    step++;
    return;
  }

  // Stap 1 – impact
  if (step === 1) {
    context.impact = text;
    addMessage("Wat is de impact hiervan op je werk? Kun je nog doorwerken of ligt je werk (deels) stil?", "bot");
    step++;
    return;
  }

  // Stap 2 – scope
  if (step === 2) {
    context.scope = text;
    addMessage("Hebben alleen jij, of ook collega’s hier last van?", "bot");
    step++;
    return;
  }

  // Stap 3 – sinds wanneer
  if (step === 3) {
    context.since = text;
    showSummary();
    step++;
    return;
  }

  // Stap 4 – bevestiging
  if (step === 4) {
    if (text.includes("ja")) {
      classifyIncident();
    } else {
      addMessage("Oké, kun je aangeven wat er niet klopt in de samenvatting?", "bot");
      step++;
    }
    return;
  }

  // Correctie
  if (step === 5) {
    context.problem += " (aangepast: " + text + ")";
    showSummary();
    step = 4;
  }
}

function showSummary() {
  const summary =
    "Samenvatting:\n\n" +
    "Probleem: " + context.problem + "\n" +
    "Impact: " + context.impact + "\n" +
    "Betreft: " + context.scope + "\n" +
    "Sinds wanneer: " + context.since + "\n\n" +
    "Klopt dit? (ja/nee)";

  addMessage(summary, "bot");
}

function classifyIncident() {
  const output =
    "✅ Type: INCIDENT\n\n" +
    "Short description:\n" +
    context.problem + "\n\n" +
    "Description:\n" +
    "Het probleem is: " + context.problem + ". " +
    "De impact is: " + context.impact + ". " +
    "Het betreft: " + context.scope + ". " +
    "Het speelt sinds: " + context.since + ".\n\n" +
    "Gewenst eindresultaat:\n" +
    "Het probleem is opgelost zodat normaal gewerkt kan worden.\n\n" +
    "Redenering:\n" +
    "Dit is een incident omdat iets niet meer werkt en dit directe impact heeft op het werk.";

  addMessage(output, "bot");
}
</script>

</body>
</html>
