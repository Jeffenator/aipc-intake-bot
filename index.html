<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>AI Intake Bot</title>
  <style>
    body { font-family: Arial; background: #f4f4f4; padding: 20px; }
    .chat { max-width: 700px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
    .msg { margin: 10px 0; }
    .bot { color: #003366; }
    .user { text-align: right; }
    input { width: 100%; padding: 10px; margin-top: 10px; }
    button { padding: 10px 20px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="chat" id="chat">
    <div class="msg bot">
      Hallo! Beschrijf kort wat je wilt, wat er niet werkt of welke vraag je hebt.
    </div>
  </div>

  <input id="input" placeholder="Typ hier je bericht..." />
  <button onclick="send()">Verstuur</button>

  <script>
    const chat = document.getElementById("chat");
  const input = document.getElementById("input");

  let step = 0;
  let answers = {};

  function addMessage(text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function send() {
    const text = input.value;
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    handleConversation(text);
  }

  function handleConversation(text) {
    switch (step) {

      case 0:
        answers.problem = text;
        addMessage(
          "Dank je. Kun je aangeven wat er concreet niet werkt of wat je wilt bereiken?",
          "bot"
        );
        step++;
        break;

      case 1:
        answers.detail = text;
        addMessage(
          "Sinds wanneer speelt dit en heeft dit impact op je werk?",
          "bot"
        );
        step++;
        break;

      case 2:
        answers.impact = text;
        addMessage(
          "Wat is voor jou het gewenste eindresultaat?",
          "bot"
        );
        step++;
        break;

      case 3:
        answers.goal = text;
        addMessage(
          "Samenvatting:\n\n" +
          "Probleem: " + answers.problem + "\n" +
          "Details: " + answers.detail + "\n" +
          "Impact: " + answers.impact + "\n" +
          "Gewenst resultaat: " + answers.goal + "\n\n" +
          "Klopt dit? (ja/nee)",
          "bot"
        );
        step++;
        break;

      case 4:
        if (text.toLowerCase().includes("ja")) {
          classify();
        } else {
          addMessage(
            "Oké, kun je aangeven wat er niet klopt?",
            "bot"
          );
          step = 1;
        }
        break;
    }
  }

  function classify() {
    let type = "RFI";
    let reasoning = "Dit is een vraag om informatie.";

    if (
      answers.problem.toLowerCase().includes("stuk") ||
      answers.problem.toLowerCase().includes("werkt niet")
    ) {
      type = "INC";
      reasoning = "Dit is een incident omdat iets niet (meer) werkt en directe impact heeft.";
    }

    if (
      answers.problem.toLowerCase().includes("aanpassen") ||
      answers.goal.toLowerCase().includes("wijzigen")
    ) {
      type = "CHG";
      reasoning = "Dit is een change omdat er een structurele aanpassing wordt gevraagd.";
    }

    addMessage(
      "✅ Classificatie voltooid\n\n" +
      "Type: " + type + "\n\n" +
      "Short description: " + answers.problem + "\n\n" +
      "Description: " + answers.detail + "\n\n" +
      "Gewenst eindresultaat: " + answers.goal + "\n\n" +
      "Redenering: " + reasoning,
      "bot"
    );
  }
  </script>
</body>
</html>
